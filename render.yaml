services:
  - type: web
    name: apsg-report
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: "10000"
      - key: ADMIN_EMAIL
        value: ""          # Set to admin's email address
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""          # Gmail/SMTP sender address
      - key: SMTP_PASS
        value: ""          # App password (not regular password)
    healthCheckPath: /api/health
